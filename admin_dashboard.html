{% extends 'base.html' %}
{% block title %}Admin Dashboard{% endblock %}
{% block content %}
<h2 class="mb-4">Admin Dashboard</h2>
<div class="row g-3">
    <div class="col-md-3"><div class="stat-card"><h6>Total Users</h6><h2>{{ total_users }}</h2></div></div>
    <div class="col-md-3"><div class="stat-card"><h6>Total Courses</h6><h2>{{ total_courses }}</h2></div></div>
    <div class="col-md-3"><div class="stat-card"><h6>Total Quizzes</h6><h2>{{ total_quizzes }}</h2></div></div>
    <div class="col-md-3"><div class="stat-card"><h6>Total Attempts</h6><h2>{{ total_attempts }}</h2></div></div>
</div>
<div class="mt-4">
    <a href="/admin/" class="btn btn-primary">Go to Django Admin Panel</a>
</div>
{% endblock %}
